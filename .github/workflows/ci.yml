name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `npm install`, not `npm ci`: esbuild (via vitest) ships ~25 per-platform
      # binaries as optional deps, and strict `npm ci` cross-platform lockfile
      # validation is brittle. install resolves the correct Linux binaries at
      # install time and matches how Vercel installs. cache: npm keeps it fast.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      # Lint carries pre-existing debt (intentional `any` across the codebase),
      # so keep it visible but non-blocking until a dedicated cleanup pass.
      - name: lint (non-blocking)
        run: npm run lint
        continue-on-error: true
      - run: npm run test
      - name: build
        run: npm run build
        env:
          # DATABASE_URL is the only var the build's module-init requires (the
          # Drizzle client throws if it's unset at import). The public Supabase
          # vars get inlined into the client bundle. The build never connects to
          # anything, so these are only satisfying import-time guards.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    # Builds + starts THIS commit's app and drives it on localhost, so the test
    # always matches the code under test (no wait-for-deploy race). It creates
    # and deletes throwaway e2e-*@fityear.test users against the real Supabase
    # (there's no separate test DB); every test cleans up after itself.
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: start app and run e2e against localhost
        run: |
          npm run start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/login >/dev/null && break
            echo "waiting for app ($i)"; sleep 2
          done
          E2E_BASE_URL=http://localhost:3000 npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
